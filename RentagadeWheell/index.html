<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Rentagade App — Service Wheel</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --pink:#E91E8C;--pink-lt:#FF5CB8;--pink-dk:#B81570;
  --teal:#00C9A7;--amber:#FFB627;--violet:#8B5CF6;
  --bg:#0A0A0F;--card:#141419;--border:rgba(255,255,255,.06);
}
body{
  font-family:'Outfit',sans-serif;background:var(--bg);
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  color:#fff;overflow:hidden;
}
.ambient{
  position:fixed;inset:0;pointer-events:none;
  background:
    radial-gradient(800px circle at 30% 40%,rgba(233,30,140,.04),transparent 60%),
    radial-gradient(600px circle at 70% 60%,rgba(0,201,167,.03),transparent 50%);
}
.layout{display:flex;align-items:center;gap:0;position:relative;z-index:2}

/* ─── TOP BAR ─── */
.topbar{
  position:fixed;top:0;left:0;right:0;
  display:flex;align-items:center;justify-content:center;gap:28px;
  padding:18px 30px;z-index:50;
}
.logo{display:flex;align-items:center;gap:10px}
.logo-mark{
  width:32px;height:32px;background:var(--pink);border-radius:8px;
  display:flex;align-items:center;justify-content:center;transform:rotate(45deg);
}
.logo-mark svg{transform:rotate(-45deg)}
.logo-text{font-size:20px;font-weight:800;letter-spacing:.5px}
.logo-text span{color:var(--pink)}

.steps-row{display:flex;align-items:center;gap:0}
.stp{
  padding:6px 14px;font-size:10px;font-weight:700;
  letter-spacing:1.5px;text-transform:uppercase;border-radius:20px;
  background:rgba(255,255,255,.03);color:rgba(255,255,255,.2);
  border:1px solid var(--border);transition:all .5s ease;white-space:nowrap;
}
.stp.on{background:var(--pink);color:#fff;border-color:var(--pink);box-shadow:0 0 20px rgba(233,30,140,.3)}
.stp.done{background:rgba(233,30,140,.1);color:var(--pink);border-color:rgba(233,30,140,.2)}
.stp-line{width:20px;height:1px;background:rgba(255,255,255,.06);transition:background .5s}
.stp-line.on{background:var(--pink)}

/* ─── WHEEL AREA ─── */
.wheel-area{
  position:relative;width:470px;height:470px;flex-shrink:0;
  transition:transform .6s cubic-bezier(.23,1,.32,1);
}
.wheel-area.shifted{transform:translateX(-40px)}

/* Animated pink glowing border ring */
.glow-border{
  position:absolute;inset:-6px;border-radius:50%;
  border:2px solid rgba(233,30,140,.25);
  pointer-events:none;z-index:1;
  box-shadow:
    0 0 15px rgba(233,30,140,.15),
    0 0 40px rgba(233,30,140,.08),
    inset 0 0 15px rgba(233,30,140,.05);
  animation:borderGlow 3s ease-in-out infinite;
}
.glow-border::after{
  content:'';position:absolute;inset:-3px;border-radius:50%;
  border:1px solid rgba(233,30,140,.08);
}
@keyframes borderGlow{
  0%,100%{
    box-shadow:0 0 15px rgba(233,30,140,.15),0 0 40px rgba(233,30,140,.08),inset 0 0 15px rgba(233,30,140,.05);
    border-color:rgba(233,30,140,.25);
  }
  50%{
    box-shadow:0 0 25px rgba(233,30,140,.3),0 0 60px rgba(233,30,140,.12),inset 0 0 20px rgba(233,30,140,.08);
    border-color:rgba(233,30,140,.4);
  }
}

/* Shimmer travelling around the ring */
.glow-shimmer{
  position:absolute;inset:-6px;border-radius:50%;
  pointer-events:none;z-index:2;overflow:hidden;
}
.glow-shimmer::before{
  content:'';position:absolute;
  width:60px;height:60px;
  background:radial-gradient(circle,rgba(233,30,140,.6),transparent 70%);
  border-radius:50%;
  top:-10px;left:50%;
  animation:shimmerTravel 4s linear infinite;
  transform-origin:30px calc(50% + 245px);
}
@keyframes shimmerTravel{
  0%{transform:rotate(0deg) translateY(0)}
  100%{transform:rotate(360deg) translateY(0)}
}

.wheel-svg{
  width:100%;height:100%;position:relative;z-index:3;
  filter:drop-shadow(0 8px 30px rgba(0,0,0,.5));
}

/* Segments */
.qseg{cursor:pointer;transition:all .45s cubic-bezier(.23,1,.32,1)}
.qseg:hover .qfill{filter:brightness(1.15)}
.qseg.active .qfill{filter:brightness(1.2)}
.qseg.dim{opacity:.12;pointer-events:none}
.qfill{transition:all .4s ease}

.qlabel{
  font-family:'Outfit',sans-serif;font-weight:700;font-size:14px;
  fill:#fff;pointer-events:none;text-anchor:middle;
  letter-spacing:1.2px;text-transform:uppercase;
  filter:drop-shadow(0 2px 8px rgba(0,0,0,.6));
}
.qlabel-sm{font-size:12.5px;font-weight:600}

.qicon{pointer-events:none;opacity:.9}

/* ─── CENTER ─── */
.center{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  width:140px;height:140px;border-radius:50%;
  background:radial-gradient(circle at 40% 35%,#1A1A22,var(--bg));
  border:2px solid rgba(255,255,255,.06);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  cursor:default;z-index:20;overflow:hidden;user-select:none;
  transition:all .7s cubic-bezier(.23,1,.32,1);
}
.center .c-title{
  font-size:15px;font-weight:900;color:rgba(255,255,255,.15);
  text-transform:uppercase;letter-spacing:1px;line-height:1.15;
  text-align:center;position:relative;z-index:2;transition:all .6s ease;
}
.center .c-sub{
  font-size:8px;font-weight:600;color:rgba(255,255,255,.06);
  letter-spacing:3px;text-transform:uppercase;margin-top:4px;
  position:relative;z-index:2;transition:all .6s ease;
}
.center .shimmer{
  position:absolute;inset:-100%;width:300%;height:300%;
  background:linear-gradient(105deg,transparent 25%,rgba(233,30,140,.08) 35%,rgba(255,92,184,.22) 40%,rgba(233,30,140,.08) 45%,transparent 55%);
  opacity:0;z-index:1;transition:opacity .5s ease;
}
.center .glow-ring{
  position:absolute;inset:-4px;border-radius:50%;
  border:2px solid transparent;z-index:0;transition:all .6s ease;
}

.center.lit{
  cursor:pointer;border-color:var(--pink);
  background:radial-gradient(circle at 40% 35%,#1E0E18,var(--bg));
  animation:cPulse 2.2s ease-in-out infinite;
}
.center.lit .shimmer{opacity:1;animation:shimRun 2s linear infinite}
.center.lit .glow-ring{
  border-color:rgba(233,30,140,.3);
  box-shadow:0 0 30px rgba(233,30,140,.15);
  animation:ringPulse 2.2s ease-in-out infinite;
}
.center.lit .c-title{
  color:#fff;
  background:linear-gradient(135deg,var(--pink-lt),var(--pink),var(--pink-lt));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
  filter:drop-shadow(0 0 12px rgba(233,30,140,.6));
}
.center.lit .c-sub{color:var(--pink);-webkit-text-fill-color:var(--pink)}
.center.lit:hover{
  transform:translate(-50%,-50%) scale(1.12);
  box-shadow:0 0 80px rgba(233,30,140,.5),0 0 160px rgba(233,30,140,.15);
}

@keyframes cPulse{
  0%,100%{box-shadow:0 0 30px rgba(233,30,140,.3),0 0 60px rgba(233,30,140,.1),inset 0 0 30px rgba(233,30,140,.05)}
  50%{box-shadow:0 0 50px rgba(233,30,140,.5),0 0 100px rgba(233,30,140,.2),inset 0 0 50px rgba(233,30,140,.1)}
}
@keyframes shimRun{0%{transform:translateX(-40%) rotate(-10deg)}100%{transform:translateX(40%) rotate(-10deg)}}
@keyframes ringPulse{0%,100%{inset:-4px;opacity:.6}50%{inset:-10px;opacity:1}}

/* ─── SIDE PANEL ─── */
.panel{
  width:0;opacity:0;overflow:hidden;
  transition:all .55s cubic-bezier(.23,1,.32,1);
  display:flex;flex-direction:column;align-items:stretch;margin-left:0;
}
.panel.open{width:280px;opacity:1;margin-left:20px}
.panel-inner{padding:16px 0}
.panel-head{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:16px;padding:0 4px;
}
.panel-title{font-size:11px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:rgba(255,255,255,.35)}
.panel-cat{font-size:18px;font-weight:800;letter-spacing:.5px;margin-bottom:20px;padding-left:4px;transition:color .3s}
.panel-back{
  display:flex;align-items:center;gap:6px;padding:6px 14px;border-radius:16px;
  background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);
  color:rgba(255,255,255,.4);font-size:11px;font-weight:600;cursor:pointer;
  transition:all .3s;letter-spacing:.5px;
}
.panel-back:hover{border-color:var(--pink);color:var(--pink)}
.panel-back svg{width:14px;height:14px}

.svc-list{display:flex;flex-direction:column;gap:6px}
.svc-item{
  display:flex;align-items:center;gap:14px;padding:14px 16px;
  border-radius:14px;background:rgba(255,255,255,.02);
  border:1px solid rgba(255,255,255,.04);cursor:pointer;
  transition:all .35s ease;opacity:0;transform:translateX(20px);
}
.svc-item.in{opacity:1;transform:translateX(0)}
.svc-item:hover{background:rgba(255,255,255,.06);border-color:rgba(255,255,255,.1);transform:translateX(4px)}
.svc-item.picked{background:rgba(233,30,140,.1);border-color:var(--pink);box-shadow:0 0 20px rgba(233,30,140,.1)}
.svc-item.picked .svc-dot{background:var(--pink);box-shadow:0 0 8px rgba(233,30,140,.5)}
.svc-item.picked .svc-name{color:#fff}

.svc-dot{width:10px;height:10px;flex-shrink:0;border-radius:50%;border:2px solid rgba(255,255,255,.15);background:transparent;transition:all .3s}
.svc-icon{width:36px;height:36px;flex-shrink:0;border-radius:10px;display:flex;align-items:center;justify-content:center;transition:all .3s}
.svc-icon svg{width:18px;height:18px}
.svc-info{flex:1;min-width:0}
.svc-name{font-size:13px;font-weight:600;color:rgba(255,255,255,.7);transition:color .3s;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.svc-desc{font-size:10px;font-weight:400;color:rgba(255,255,255,.25);margin-top:1px}
.svc-arrow{width:16px;height:16px;flex-shrink:0;color:rgba(255,255,255,.1);transition:color .3s}
.svc-item:hover .svc-arrow{color:rgba(255,255,255,.3)}
.svc-item.picked .svc-arrow{color:var(--pink)}

/* ─── OVERLAY ─── */
.overlay{
  position:fixed;inset:0;background:rgba(5,5,10,.9);backdrop-filter:blur(16px);
  display:flex;align-items:center;justify-content:center;z-index:200;
  opacity:0;pointer-events:none;transition:opacity .4s ease;
}
.overlay.show{opacity:1;pointer-events:auto}
.ov-card{
  background:var(--card);border:1px solid rgba(233,30,140,.2);border-radius:24px;
  padding:44px 52px;text-align:center;max-width:400px;
  box-shadow:0 0 80px rgba(233,30,140,.15);
  transform:scale(.92) translateY(10px);transition:transform .5s cubic-bezier(.23,1,.32,1);
}
.overlay.show .ov-card{transform:scale(1) translateY(0)}
.ov-card h2{font-size:24px;font-weight:800;margin-bottom:6px}
.ov-card .ov-cat{color:var(--pink);font-size:12px;font-weight:600;letter-spacing:2px;text-transform:uppercase;margin-bottom:16px}
.ov-card p{color:rgba(255,255,255,.4);font-size:13px;line-height:1.6;margin-bottom:28px}
.ov-card .ov-btn{
  display:inline-flex;align-items:center;gap:8px;padding:14px 36px;
  background:var(--pink);color:#fff;text-decoration:none;border-radius:30px;
  font-weight:700;font-size:13px;letter-spacing:1px;text-transform:uppercase;transition:all .3s;
}
.ov-card .ov-btn:hover{background:var(--pink-lt);box-shadow:0 0 30px rgba(233,30,140,.4);transform:translateY(-2px)}
.ov-card .ov-btn svg{width:16px;height:16px}
.ov-card .ov-close{
  display:block;margin-top:18px;color:rgba(255,255,255,.2);font-size:12px;
  cursor:pointer;background:none;border:none;font-family:'Outfit',sans-serif;font-weight:500;transition:color .3s;
}
.ov-card .ov-close:hover{color:#fff}

/* Category panel colors */
.cat-pink .panel-cat{color:var(--pink)}
.cat-pink .svc-icon{background:rgba(233,30,140,.1)}
.cat-pink .svc-icon svg{color:var(--pink)}
.cat-teal .panel-cat{color:var(--teal)}
.cat-teal .svc-icon{background:rgba(0,201,167,.1)}
.cat-teal .svc-icon svg{color:var(--teal)}
.cat-amber .panel-cat{color:var(--amber)}
.cat-amber .svc-icon{background:rgba(255,182,39,.1)}
.cat-amber .svc-icon svg{color:var(--amber)}
.cat-violet .panel-cat{color:var(--violet)}
.cat-violet .svc-icon{background:rgba(139,92,246,.1)}
.cat-violet .svc-icon svg{color:var(--violet)}

@media(max-width:820px){
  .layout{flex-direction:column;gap:0}
  .wheel-area{width:320px;height:320px}
  .wheel-area.shifted{transform:translateX(0) scale(.85)}
  .center{width:110px;height:110px}
  .center .c-title{font-size:13px}
  .panel.open{width:300px;margin-left:0;margin-top:10px}
  .topbar{padding:12px 16px;gap:12px;flex-wrap:wrap}
  .logo-text{font-size:16px}
}
</style>
</head>
<body>

<div class="ambient"></div>

<div class="topbar">
  <div class="logo">
    <div class="logo-mark">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 1L13 7L7 13L1 7L7 1Z" fill="white"/></svg>
    </div>
    <div class="logo-text"><span>Rentagade</span>App</div>
  </div>
  <div class="steps-row">
    <div class="stp on" id="s1">1 · Choose</div>
    <div class="stp-line" id="l1"></div>
    <div class="stp" id="s2">2 · Select</div>
    <div class="stp-line" id="l2"></div>
    <div class="stp" id="s3">3 · Rentagade It</div>
  </div>
</div>

<div class="layout">
  <div class="wheel-area" id="wheelArea">
    <!-- Glowing pink border -->
    <div class="glow-border"></div>
    <div class="glow-shimmer"></div>

    <svg class="wheel-svg" viewBox="0 0 460 460">
      <defs>
        <!-- 3D-style gradients with highlight/shadow -->
        <radialGradient id="gPink" cx="35%" cy="35%" r="65%">
          <stop offset="0%" stop-color="#FF6EC7"/>
          <stop offset="50%" stop-color="#E91E8C"/>
          <stop offset="100%" stop-color="#8A0E52"/>
        </radialGradient>
        <radialGradient id="gTeal" cx="65%" cy="35%" r="65%">
          <stop offset="0%" stop-color="#4AECD5"/>
          <stop offset="50%" stop-color="#00C9A7"/>
          <stop offset="100%" stop-color="#006B5A"/>
        </radialGradient>
        <radialGradient id="gAmber" cx="35%" cy="65%" r="65%">
          <stop offset="0%" stop-color="#FFD876"/>
          <stop offset="50%" stop-color="#FFB627"/>
          <stop offset="100%" stop-color="#996B10"/>
        </radialGradient>
        <radialGradient id="gViolet" cx="35%" cy="35%" r="65%">
          <stop offset="0%" stop-color="#B794F6"/>
          <stop offset="50%" stop-color="#8B5CF6"/>
          <stop offset="100%" stop-color="#4C2D8A"/>
        </radialGradient>

        <!-- Inner shadow filter for 3D depth -->
        <filter id="innerShadow" x="-10%" y="-10%" width="120%" height="120%">
          <feGaussianBlur in="SourceAlpha" stdDeviation="4" result="blur"/>
          <feOffset dx="2" dy="3" result="offsetBlur"/>
          <feComposite in="SourceGraphic" in2="offsetBlur" operator="over"/>
        </filter>
      </defs>

      <!--
        Donut: center=230,230  outer_r=218  inner_r=88
        Quadrant centers (midpoint of arc, midpoint of radial thickness):
        mid_r = (218+88)/2 = 153
        Q0 top-right: angle=-45° → x=230+153*cos(-45)=338, y=230+153*sin(-45)=122
        Q1 bot-right: angle=45°  → x=338, y=338
        Q2 bot-left:  angle=135° → x=122, y=338
        Q3 top-left:  angle=225° → x=122, y=122
      -->

      <!-- Q0: Buy/Sell — top-right -->
      <g class="qseg" data-q="0" onclick="pickCat(0)">
        <path class="qfill" fill="url(#gPink)" stroke="rgba(255,255,255,.12)" stroke-width="1.5"
          d="M230,12 A218,218 0 0,1 448,230 L318,230 A88,88 0 0,0 230,142 Z"/>
        <!-- Icon centered at 338,108 -->
        <g class="qicon" transform="translate(326,92) scale(1.35)">
          <path d="M12 3L2 12h3v8h5v-5h4v5h5v-8h3L12 3z" fill="none" stroke="white" stroke-width="1.5" stroke-linejoin="round"/>
        </g>
        <!-- Text centered at 338, below icon -->
        <text class="qlabel" x="340" y="136">Buy /</text>
        <text class="qlabel qlabel-sm" x="340" y="153">Sell</text>
      </g>

      <!-- Q1: Property Services — bottom-right -->
      <g class="qseg" data-q="1" onclick="pickCat(1)">
        <path class="qfill" fill="url(#gTeal)" stroke="rgba(255,255,255,.12)" stroke-width="1.5"
          d="M448,230 A218,218 0 0,1 230,448 L230,318 A88,88 0 0,0 318,230 Z"/>
        <!-- Icon centered at 338,320 -->
        <g class="qicon" transform="translate(326,304) scale(1.35)">
          <rect x="3" y="3" width="7" height="7" rx="1" fill="none" stroke="white" stroke-width="1.4"/>
          <rect x="14" y="3" width="7" height="7" rx="1" fill="none" stroke="white" stroke-width="1.4"/>
          <rect x="3" y="14" width="7" height="7" rx="1" fill="none" stroke="white" stroke-width="1.4"/>
          <rect x="14" y="14" width="7" height="7" rx="1" fill="none" stroke="white" stroke-width="1.4"/>
        </g>
        <text class="qlabel" x="340" y="348">Property</text>
        <text class="qlabel qlabel-sm" x="340" y="365">Services</text>
      </g>

      <!-- Q2: Rent/Lease — bottom-left -->
      <g class="qseg" data-q="2" onclick="pickCat(2)">
        <path class="qfill" fill="url(#gAmber)" stroke="rgba(255,255,255,.12)" stroke-width="1.5"
          d="M230,448 A218,218 0 0,1 12,230 L142,230 A88,88 0 0,0 230,318 Z"/>
        <!-- Icon centered at 122,320 -->
        <g class="qicon" transform="translate(110,304) scale(1.35)">
          <rect x="4" y="4" width="16" height="14" rx="2" fill="none" stroke="white" stroke-width="1.4"/>
          <circle cx="12" cy="11" r="3" fill="none" stroke="white" stroke-width="1.3"/>
          <circle cx="12" cy="11" r="0.8" fill="white"/>
          <line x1="12" y1="4" x2="12" y2="1" stroke="white" stroke-width="1.4" stroke-linecap="round"/>
        </g>
        <text class="qlabel" x="122" y="348">Rent /</text>
        <text class="qlabel qlabel-sm" x="122" y="365">Lease</text>
      </g>

      <!-- Q3: Legal Services — top-left -->
      <g class="qseg" data-q="3" onclick="pickCat(3)">
        <path class="qfill" fill="url(#gViolet)" stroke="rgba(255,255,255,.12)" stroke-width="1.5"
          d="M12,230 A218,218 0 0,1 230,12 L230,142 A88,88 0 0,0 142,230 Z"/>
        <!-- Icon centered at 122,108 — scales of justice -->
        <g class="qicon" transform="translate(110,92) scale(1.35)">
          <line x1="12" y1="3" x2="12" y2="19" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="5" y1="6" x2="19" y2="6" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
          <path d="M5 6l-2 6h6L7 6" fill="none" stroke="white" stroke-width="1.3" stroke-linejoin="round"/>
          <path d="M19 6l-2 6h6l-2-6" fill="none" stroke="white" stroke-width="1.3" stroke-linejoin="round"/>
          <rect x="8" y="19" width="8" height="2" rx="1" fill="none" stroke="white" stroke-width="1.3"/>
        </g>
        <text class="qlabel" x="122" y="136">Legal</text>
        <text class="qlabel qlabel-sm" x="122" y="153">Services</text>
      </g>
    </svg>

    <!-- Center -->
    <div class="center" id="ctr" onclick="goCtr()">
      <div class="shimmer"></div>
      <div class="glow-ring"></div>
      <div class="c-title">Rentagade<br>It</div>
      <div class="c-sub">Select a service</div>
    </div>
  </div>

  <!-- Side Panel -->
  <div class="panel" id="panel">
    <div class="panel-inner">
      <div class="panel-head">
        <div class="panel-title">Services</div>
        <div class="panel-back" onclick="reset()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
          Back
        </div>
      </div>
      <div class="panel-cat" id="panelCat"></div>
      <div class="svc-list" id="svcList"></div>
    </div>
  </div>
</div>

<!-- Overlay -->
<div class="overlay" id="ov">
  <div class="ov-card">
    <div class="ov-cat" id="ovCat"></div>
    <h2 id="ovTitle"></h2>
    <p id="ovDesc"></p>
    <a class="ov-btn" id="ovLink" href="#" target="_blank">
      Visit Page
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
    </a>
    <button class="ov-close" onclick="closeOv()">← Go back to wheel</button>
  </div>
</div>

const cats=[

    {name:'Credit Repair',desc:'Rental readiness program',url:'https://www.therentagadeapp.com/copy-of-services',
      icon:'<path d="M23 6l-9.5 9.5-5-5L1 18" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/><path d="M17 6h6v6" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>'}

      icon:'<circle cx="11" cy="11" r="8" fill="none" stroke="currentColor" stroke-width="1.8"/><path d="M21 21l-4.35-4.35" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>'},

      icon:'<path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2" fill="none" stroke="currentColor" stroke-width="1.8"/><circle cx="9" cy="7" r="4" fill="none" stroke="currentColor" stroke-width="1.8"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75" fill="none" stroke="currentColor" stroke-width="1.8"/>'}
  ]},
  {name:'Legal Services',cls:'cat-violet',color:'#8B5CF6',subs:[
    {name:'Quit Claim Deed',desc:'Transfer ownership — $250',url:'https://www.therentagadeapp.com/copy-of-services',
      icon:'<path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8l-6-6z" fill="none" stroke="currentColor" stroke-width="1.8"/><path d="M14 2v6h6" stroke="currentColor" stroke-width="1.8"/>'},
    {name:'Deed Search',desc:'Find current owner — $10',url:'https://www.therentagadeapp.com/copy-of-services',
      icon:'<circle cx="11" cy="11" r="8" fill="none" stroke="currentColor" stroke-width="1.8"/><path d="M21 21l-4.35-4.35M11 8v6M8 11h6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>'},
    {name:'Eviction Services',desc:'Court hearings from $350',url:'https://www.therentagadeapp.com/copy-of-services',
      icon:'<path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>'},
    {name:'LLC Setup',desc:'Formation + EIN — $150',url:'https://www.therentagadeapp.com/copy-of-services',
      icon:'<rect x="2" y="7" width="20" height="14" rx="2" fill="none" stroke="currentColor" stroke-width="1.8"/><path d="M16 7V5a4 4 0 00-8 0v2" fill="none" stroke="currentColor" stroke-width="1.8"/>'},
    {name:'Notary Services',desc:'Mobile notary available',url:'https://www.therentagadeapp.com/copy-of-services',
      icon:'<path d="M12 20h9M16.5 3.5a2.12 2.12 0 013 3L7 19l-4 1 1-4L16.5 3.5z" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>'}
  ]}
];

let selCat=null,selSub=null;

function setSteps(n){
  ['s1','s2','s3'].forEach((id,i)=>{
    const el=document.getElementById(id),step=i+1;
    el.className='stp'+(step<n?' done':step===n?' on':'');
  });
  document.getElementById('l1').className='stp-line'+(n>=2?' on':'');
  document.getElementById('l2').className='stp-line'+(n>=3?' on':'');
}

function pickCat(idx){
  if(selCat!==null)return;
  selCat=idx;
  document.querySelectorAll('.qseg').forEach((g,i)=>{
    g.classList.toggle('active',i===idx);
    g.classList.toggle('dim',i!==idx);
  });
  document.getElementById('wheelArea').classList.add('shifted');
  const panel=document.getElementById('panel');
  panel.className='panel open '+cats[idx].cls;
  document.getElementById('panelCat').textContent=cats[idx].name;
  const list=document.getElementById('svcList');
  list.innerHTML='';
  cats[idx].subs.forEach((sub,si)=>{
    const div=document.createElement('div');
    div.className='svc-item';
    div.innerHTML=`
      <div class="svc-dot"></div>
      <div class="svc-icon"><svg viewBox="0 0 24 24" fill="none">${sub.icon}</svg></div>
      <div class="svc-info"><div class="svc-name">${sub.name}</div><div class="svc-desc">${sub.desc}</div></div>
      <svg class="svc-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 18l6-6-6-6"/></svg>`;
    div.onclick=()=>pickSub(idx,si);
    list.appendChild(div);
    setTimeout(()=>div.classList.add('in'),100+si*80);
  });
  setSteps(2);
}

function pickSub(catIdx,subIdx){
  if(selSub!==null)return;
  selSub=subIdx;
  document.querySelectorAll('.svc-item').forEach((el,i)=>{if(i===subIdx)el.classList.add('picked')});
  document.getElementById('ctr').classList.add('lit');
  document.querySelector('.c-sub').textContent='→ TAP TO GO →';
  setSteps(3);
}

function goCtr(){
  if(!document.getElementById('ctr').classList.contains('lit'))return;
  const sub=cats[selCat].subs[selSub];
  document.getElementById('ovCat').textContent=cats[selCat].name;
  document.getElementById('ovTitle').textContent=sub.name;
  document.getElementById('ovDesc').textContent=sub.desc+'. You\'ll be taken to the service page on The Rentagade App.';
  document.getElementById('ovLink').href=sub.url;
  document.getElementById('ov').classList.add('show');
}

function closeOv(){document.getElementById('ov').classList.remove('show')}

function reset(){
  selCat=null;selSub=null;
  document.querySelectorAll('.qseg').forEach(g=>{g.classList.remove('active','dim')});
  document.getElementById('wheelArea').classList.remove('shifted');
  document.getElementById('panel').className='panel';
  const ctr=document.getElementById('ctr');
  ctr.classList.remove('lit');
  document.querySelector('.c-sub').textContent='Select a service';
  setSteps(1);closeOv();
}
</script>
</body>
</html>
