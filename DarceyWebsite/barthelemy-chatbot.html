<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Barthelemy Group — AI Assistant</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Outfit:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --ink:#0b1120;--ink-90:#141d32;--ink-80:#1c2841;
  --parchment:#f7f5f0;--cream:#edeae3;--warm-white:#fdfcfa;
  --gold:#b8952e;--gold-bright:#d4ad3c;--gold-muted:#9a7d28;
  --sage:#4a7c6f;--sage-light:#5d9a8a;
  --slate:#6b7a8d;--slate-light:#8d9bab;
  --radius:12px;--radius-lg:16px;
  --ease:cubic-bezier(.4,0,.2,1);
}
html,body{height:100%;overflow:hidden}
body{font-family:'Outfit',sans-serif;background:var(--parchment);color:var(--ink);-webkit-font-smoothing:antialiased}

/* ── Layout ── */
.app{display:flex;flex-direction:column;height:100vh;max-width:520px;margin:0 auto;position:relative}

/* ── Header ── */
.header{
  padding:20px 24px;display:flex;align-items:center;gap:14px;
  border-bottom:1px solid var(--cream);background:var(--warm-white);
  flex-shrink:0;position:relative;z-index:10;
}
.header-logo{
  width:38px;height:38px;border:1.5px solid var(--gold);border-radius:9px;
  display:flex;align-items:center;justify-content:center;
  font-family:'Cormorant Garamond',serif;font-weight:700;font-size:1.15rem;color:var(--gold);
}
.header-info h1{font-family:'Cormorant Garamond',serif;font-size:1.1rem;font-weight:600;color:var(--ink);line-height:1.2}
.header-info p{font-size:.72rem;color:var(--sage);font-weight:600;display:flex;align-items:center;gap:5px}
.status-dot{width:6px;height:6px;border-radius:50%;background:var(--sage);animation:pulse 2s ease infinite}
@keyframes pulse{0%,100%{opacity:.5}50%{opacity:1}}
.header-close{
  margin-left:auto;width:32px;height:32px;border-radius:8px;border:none;
  background:var(--cream);cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:all .2s var(--ease);
}
.header-close:hover{background:var(--ink);color:var(--parchment)}
.header-close svg{width:14px;height:14px;stroke:currentColor;stroke-width:2;fill:none}

/* ── Messages ── */
.messages{
  flex:1;overflow-y:auto;padding:24px;display:flex;flex-direction:column;gap:16px;
  scroll-behavior:smooth;
}
.messages::-webkit-scrollbar{width:4px}
.messages::-webkit-scrollbar-track{background:transparent}
.messages::-webkit-scrollbar-thumb{background:var(--cream);border-radius:4px}

.msg{display:flex;gap:10px;max-width:88%;animation:msgIn .35s var(--ease) both}
@keyframes msgIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.msg-bot{align-self:flex-start}
.msg-user{align-self:flex-end;flex-direction:row-reverse}
.msg-avatar{
  width:30px;height:30px;min-width:30px;border-radius:8px;
  display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:700;
  margin-top:2px;
}
.msg-bot .msg-avatar{background:var(--ink);color:var(--gold);font-family:'Cormorant Garamond',serif;font-size:.85rem}
.msg-user .msg-avatar{background:var(--sage);color:#fff}
.msg-bubble{
  padding:14px 18px;border-radius:var(--radius);font-size:.9rem;line-height:1.65;
}
.msg-bot .msg-bubble{background:var(--warm-white);border:1px solid var(--cream);color:var(--ink)}
.msg-user .msg-bubble{background:var(--ink);color:var(--parchment);border:1px solid var(--ink-80)}
.msg-bubble strong{font-weight:600}
.msg-bubble a{color:var(--gold);text-decoration:none;font-weight:600}
.msg-bubble a:hover{text-decoration:underline}
.msg-time{font-size:.65rem;color:var(--slate);margin-top:4px;padding:0 4px}
.msg-user .msg-time{text-align:right}

/* Typing indicator */
.typing{display:flex;gap:10px;align-self:flex-start;max-width:88%;animation:msgIn .3s var(--ease) both}
.typing .msg-avatar{width:30px;height:30px;min-width:30px;border-radius:8px;background:var(--ink);color:var(--gold);display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-size:.85rem;font-weight:700}
.typing-dots{
  display:flex;align-items:center;gap:4px;padding:16px 20px;
  background:var(--warm-white);border:1px solid var(--cream);border-radius:var(--radius);
}
.typing-dot{width:6px;height:6px;border-radius:50%;background:var(--slate-light);animation:typeBounce 1.4s ease infinite}
.typing-dot:nth-child(2){animation-delay:.15s}
.typing-dot:nth-child(3){animation-delay:.3s}
@keyframes typeBounce{0%,60%,100%{transform:translateY(0);opacity:.4}30%{transform:translateY(-6px);opacity:1}}

/* Quick replies */
.quick-replies{display:flex;flex-wrap:wrap;gap:8px;padding:0 24px 8px;animation:msgIn .4s var(--ease) .1s both}
.qr-btn{
  padding:9px 18px;border-radius:20px;border:1.5px solid var(--cream);
  background:var(--warm-white);color:var(--ink);font-family:'Outfit',sans-serif;
  font-size:.8rem;font-weight:600;cursor:pointer;transition:all .25s var(--ease);
  white-space:nowrap;
}
.qr-btn:hover{border-color:var(--gold);color:var(--gold);background:rgba(184,149,46,.04)}

/* Appointment form inside chat */
.appt-form{
  background:var(--warm-white);border:1px solid var(--cream);border-radius:var(--radius-lg);
  padding:20px;margin-top:4px;
}
.appt-form h4{font-family:'Outfit',sans-serif;font-weight:700;font-size:.88rem;margin-bottom:14px;color:var(--ink)}
.appt-fg{margin-bottom:12px}
.appt-fg label{display:block;font-size:.72rem;font-weight:600;color:var(--slate);margin-bottom:4px;letter-spacing:.06em;text-transform:uppercase}
.appt-fg input,.appt-fg select,.appt-fg textarea{
  width:100%;padding:10px 14px;border:1.5px solid var(--cream);border-radius:8px;
  font-family:'Outfit',sans-serif;font-size:.85rem;color:var(--ink);background:var(--parchment);
  outline:none;transition:border .2s var(--ease);
}
.appt-fg input:focus,.appt-fg select:focus,.appt-fg textarea:focus{border-color:var(--gold)}
.appt-fg textarea{resize:vertical;min-height:60px}
.appt-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.appt-submit{
  width:100%;padding:12px;border:none;border-radius:8px;
  background:var(--sage);color:#fff;font-family:'Outfit',sans-serif;
  font-size:.85rem;font-weight:600;cursor:pointer;transition:all .25s var(--ease);
  margin-top:4px;
}
.appt-submit:hover{background:var(--sage-light)}

/* ── Input ── */
.input-area{
  padding:16px 24px 20px;border-top:1px solid var(--cream);background:var(--warm-white);
  flex-shrink:0;
}
.input-wrap{
  display:flex;align-items:flex-end;gap:10px;background:var(--parchment);
  border:1.5px solid var(--cream);border-radius:var(--radius);padding:6px 8px 6px 16px;
  transition:border .25s var(--ease);
}
.input-wrap:focus-within{border-color:var(--gold)}
.input-wrap textarea{
  flex:1;border:none;background:transparent;font-family:'Outfit',sans-serif;
  font-size:.9rem;color:var(--ink);resize:none;outline:none;line-height:1.5;
  max-height:100px;padding:8px 0;
}
.input-wrap textarea::placeholder{color:var(--slate-light)}
.send-btn{
  width:38px;height:38px;min-width:38px;border-radius:10px;border:none;
  background:var(--ink);color:var(--parchment);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all .25s var(--ease);
}
.send-btn:hover{background:var(--gold);color:var(--ink)}
.send-btn:disabled{opacity:.3;cursor:default}
.send-btn svg{width:16px;height:16px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.input-hint{font-size:.68rem;color:var(--slate);margin-top:8px;text-align:center}

/* Powered by */
.powered{text-align:center;padding:8px;font-size:.65rem;color:var(--slate-light);background:var(--warm-white)}

@media(max-width:520px){
  .app{max-width:100%}
  .quick-replies{padding:0 16px 8px}
  .messages{padding:16px}
  .header{padding:16px}
  .input-area{padding:12px 16px 16px}
}
</style>
</head>
<body>

<div class="app">
  <div class="header">
    <div class="header-logo">B</div>

// ═══════════════════════════════════════════════════
// INTENT MATCHING ENGINE
// ═══════════════════════════════════════════════════

const intents = [
  // Greetings
  { patterns: [/^(hi|hello|hey|good morning|good afternoon|good evening|howdy|greetings)/i], handler: 'greeting' },
  // Thanks
  { patterns: [/thank|thanks|appreciate/i], handler: 'thanks' },
  // Goodbye
  { patterns: [/bye|goodbye|see you|take care|talk later/i], handler: 'goodbye' },

  // Appointment / Schedule
  { patterns: [/schedul|appointment|book|set up.*(?:call|meet|consult)|arrange.*(?:call|meet)|free.*consult/i], handler: 'appointment' },

  // Pricing / Cost
  { patterns: [/(?:how much|price|pricing|cost|charge|fee|rate|quote|estimate|afford|budget|expensive)/i], handler: 'pricing' },

  // LEGALMED
  { patterns: [/legal.*med|liaison.*network|case.*management|medical.*referral|attorney.*referral|litigation|paralegal|personal.*injury|medical.*malpractice|worker.*comp|lien.*reduction|settlement|scarfone/i], handler: 'legalmed' },
  { patterns: [/(?:find|need|looking for).*(?:doctor|lawyer|attorney|specialist)/i], handler: 'legalmed' },
  { patterns: [/(?:hurt|injured|accident|injury)/i], handler: 'legalmed_injury' },

  // INSURANCE
  { patterns: [/insurance|vitalbiz|broker.*partner|coverage|health.*plan|dental.*plan|vision.*plan|life.*(?:insurance|plan)|disabilit|medicaid|medicare|part.*d|prescription.*drug|marketplace|aca|obamacare|enroll|open.*enrollment/i], handler: 'insurance' },
  { patterns: [/health.*insurance/i], handler: 'insurance_health' },
  { patterns: [/dental/i], handler: 'insurance_dental' },
  { patterns: [/vision|eye.*care|glasses|contacts/i], handler: 'insurance_vision' },
  { patterns: [/life.*insurance/i], handler: 'insurance_life' },
  { patterns: [/disabilit/i], handler: 'insurance_disability' },
  { patterns: [/medicare|medicaid/i], handler: 'insurance_medicare' },

  // SHREDDING
  { patterns: [/shred|echo.*safe|document.*destruct|paper.*destruct|hard.*drive.*destruct|data.*destruct|confiden.*document|secure.*dispos|certificate.*destruct/i], handler: 'shredding' },
  { patterns: [/one.*time.*shred|purge|bulk.*shred/i], handler: 'shredding_onetime' },
  { patterns: [/regular.*shred|schedul.*shred|recurring|pickup/i], handler: 'shredding_recurring' },
  { patterns: [/hard.*drive|electronic|media.*destruct|e-waste/i], handler: 'shredding_harddrive' },
  { patterns: [/hipaa|healthcare.*shred|medical.*record.*shred|patient.*record/i], handler: 'shredding_healthcare' },
  { patterns: [/client.*portal|invoice|payment.*portal|log.*in|account/i], handler: 'portal' },

  // ABOUT / FOUNDER / GENERAL
  { patterns: [/who.*(?:are you|is|run|own|found)|about.*(?:you|company|founder|darcey|barthelemy)|tell me about/i], handler: 'about' },
  { patterns: [/where.*(?:locat|based|office|address)/i], handler: 'location' },
  { patterns: [/what.*(?:do you|services|offer|provide|help)/i], handler: 'overview' },
  { patterns: [/contact|phone|email|reach|call|get.*(?:in touch|hold of)/i], handler: 'contact' },
  { patterns: [/hours|open|available|when/i], handler: 'hours' },
  { patterns: [/which.*(?:service|business)/i], handler: 'overview' },
];

function matchIntent(text) {
  for (const intent of intents) {
    for (const pattern of intent.patterns) {
      if (pattern.test(text)) return intent.handler;
    }
  }
  return 'fallback';
}

// ═══════════════════════════════════════════════════
// CHAT ENGINE
// ═══════════════════════════════════════════════════

const messagesEl = document.getElementById('messages');
const inputEl = document.getElementById('userInput');
const qrWrap = document.getElementById('quickRepliesWrap');

function getTime() {
  return new Date().toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true });
}

function addBotMessage(html, showForm = false) {
  const div = document.createElement('div');
  div.className = 'msg msg-bot';
  div.innerHTML = `
    <div class="msg-avatar">B</div>
    <div>
      <div class="msg-bubble">${html.replace(/\n/g, '<br>')}</div>
      ${showForm ? buildApptForm() : ''}
      <div class="msg-time">${getTime()}</div>
    </div>
  `;
  messagesEl.appendChild(div);
  scrollBottom();
}

function addUserMessage(text) {
  const div = document.createElement('div');
  div.className = 'msg msg-user';
  div.innerHTML = `
    <div class="msg-avatar">You</div>
    <div>
      <div class="msg-bubble">${text}</div>
      <div class="msg-time">${getTime()}</div>
    </div>
  `;
  messagesEl.appendChild(div);
  scrollBottom();
}

function showTyping() {
  const div = document.createElement('div');
  div.className = 'typing';
  div.id = 'typingIndicator';
  div.innerHTML = `<div class="msg-avatar">B</div><div class="typing-dots"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>`;
  messagesEl.appendChild(div);
  scrollBottom();
}

function hideTyping() {
  const el = document.getElementById('typingIndicator');
  if (el) el.remove();
}

function showQuickReplies(options) {
  qrWrap.innerHTML = '';
  if (!options || !options.length) return;
  const div = document.createElement('div');
  div.className = 'quick-replies';
  options.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'qr-btn';
    btn.textContent = opt;
    btn.onclick = () => { qrWrap.innerHTML = ''; processInput(opt); };
    div.appendChild(btn);
  });
  qrWrap.appendChild(div);
}

function buildApptForm() {
  return `<div class="appt-form">
    <h4>Schedule a Consultation</h4>
    <div class="appt-row">
      <div class="appt-fg"><label>First Name</label><input type="text" id="apptFirst" placeholder="Your first name"></div>
      <div class="appt-fg"><label>Last Name</label><input type="text" id="apptLast" placeholder="Your last name"></div>
    </div>
    <div class="appt-row">
      <div class="appt-fg"><label>Email</label><input type="email" id="apptEmail" placeholder="you@email.com"></div>
      <div class="appt-fg"><label>Phone</label><input type="tel" id="apptPhone" placeholder="(561) 000-0000"></div>
    </div>
    <div class="appt-fg">
      <label>Service</label>
      <select id="apptService">
        <option value="">Select a service...</option>
        <option>LegalMed — Medical Referral</option>
        <option>LegalMed — Case Management</option>
        <option>LegalMed — Attorney Referral</option>
        <option>VitalBiz — Health Insurance</option>
        <option>VitalBiz — Dental / Vision</option>
        <option>VitalBiz — Life / Disability</option>
        <option>VitalBiz — Medicare / Medicaid</option>
        <option>Echo Safe — One-Time Shredding</option>
        <option>Echo Safe — Scheduled Shredding</option>
        <option>Echo Safe — Hard Drive Destruction</option>
        <option>Other / Multiple Services</option>
      </select>
    </div>
    <div class="appt-row">
      <div class="appt-fg"><label>Preferred Date</label><input type="date" id="apptDate"></div>
      <div class="appt-fg"><label>Preferred Time</label><select id="apptTime"><option>Morning (9–12)</option><option>Afternoon (12–3)</option><option>Late Afternoon (3–5)</option><option>Flexible</option></select></div>
    </div>
    <div class="appt-fg"><label>Notes (optional)</label><textarea id="apptNotes" placeholder="Anything else we should know..."></textarea></div>
    <button class="appt-submit" onclick="submitAppointment()">Request Consultation</button>
  </div>`;
}

function submitAppointment() {
  const first = document.getElementById('apptFirst')?.value.trim();
  const last = document.getElementById('apptLast')?.value.trim();
  const email = document.getElementById('apptEmail')?.value.trim();
  const service = document.getElementById('apptService')?.value;

  if (!first || !last || !email || !service) {
    addBotMessage(`Please fill in at least your <strong>name</strong>, <strong>email</strong>, and <strong>service of interest</strong> so we can confirm your appointment.`);
    return;
  }

  addBotMessage(`Thank you, <strong>${first}</strong>! Your consultation request has been submitted.\n\n<strong>Service:</strong> ${service}\n<strong>Email:</strong> ${email}\n\nOur team will reach out within 24 hours to confirm your appointment. If you need immediate assistance:\n\n• LegalMed: <a href="tel:5613526421">(561) 352-6421</a>\n• Shredding: <a href="tel:5615102211">(561) 510-2211</a>\n• Insurance: <a href="mailto:info@vitalbizbrokerpartners.com">info@vitalbizbrokerpartners.com</a>`);
  showQuickReplies(['Ask another question', 'Our services']);
}

function processInput(text) {
  addUserMessage(text);
  inputEl.value = '';
  inputEl.style.height = 'auto';

  showTyping();
  const delay = 600 + Math.random() * 800;

  setTimeout(() => {
    hideTyping();
    const handler = matchIntent(text);
    const response = getResponse(handler, text);
    addBotMessage(response.text, response.showForm || false);
    showQuickReplies(response.quickReplies || []);
  }, delay);
}

function sendMessage() {
  const text = inputEl.value.trim();
  if (!text) return;
  qrWrap.innerHTML = '';
  processInput(text);
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

// Auto-resize textarea
inputEl.addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 100) + 'px';
});

function scrollBottom() {
  setTimeout(() => { messagesEl.scrollTop = messagesEl.scrollHeight; }, 50);
}

    addBotMessage(`Welcome to the <strong>Barthelemy Group</strong>. I'm here to help you with any questions about our services.\n\nWe offer <strong>legal and medical referrals</strong>, <strong>insurance advisory</strong>, and <strong>secure document shredding</strong> across South Florida.\n\nHow can I assist you today?`);
    showQuickReplies(['Legal & Medical Services', 'Insurance Coverage', 'Document Shredding', 'Schedule a Consultation', 'Contact Information']);
  }, 500);
});
